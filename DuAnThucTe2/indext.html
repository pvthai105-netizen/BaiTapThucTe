<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNTT4_PVT</title>
<link rel="stylesheet" href="./style.css">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>


<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>
<div class="ambient ambient-3"></div>


<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>

<div class="corner corner-br"></div>


<div class="header">
  <div class="logo-text">SONGOKU</div>
</div>

<div class="panel">
  <div class="panel-header">
    <div class="dot"></div>
  <div class="btn-grid">
    <button class="toast-btn btn-success" onclick="showToast('success')">
      <span class="btn-icon">✓</span> Success
    </button>
    <button class="toast-btn btn-error" onclick="showToast('error')">
      <span class="btn-icon">✕</span> Error
    </button>
    <button class="toast-btn btn-info" onclick="showToast('info')">
      <span class="btn-icon">M</span> Info
    </button>
    <button class="toast-btn btn-warning" onclick="showToast('warning')">
      <span class="btn-icon">⚠</span> Warning
    </button>
  </div>
</div>

<div id="container">

</div>

<div class="status-bar">
  <div class="status-item">CNTT4</div>
</div>
<script src="./script.js"></script>
</body>
</html>
